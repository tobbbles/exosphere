name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.19"]
        otp: ["27"]

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          version-type: loose
          hex-cache: true
          rebar-cache: true
          mix-cache: true

      - name: Install deps
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  lint:
    name: Lint (format + credo)
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"
          version-type: loose
          hex-cache: true
          rebar-cache: true
          mix-cache: true

      - name: Install deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      PLT_CACHE_VERSION: v1

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"
          version-type: loose
          hex-cache: true
          rebar-cache: true
          mix-cache: true

      - name: Compute toolchain versions (for PLT cache key)
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "elixir=$(elixir -e 'IO.puts(System.version())')" >> "$GITHUB_OUTPUT"
          echo "erts=$(erl -noshell -eval 'io:format(\"~s\", [erlang:system_info(version)]), init:stop().' )" >> "$GITHUB_OUTPUT"

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-${{ env.PLT_CACHE_VERSION }}-elixir-${{ steps.toolchain.outputs.elixir }}-erts-${{ steps.toolchain.outputs.erts }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-${{ env.PLT_CACHE_VERSION }}-

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Validate cached PLT (rebuild if old)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f priv/plts/project.plt ]; then
            if ! dialyzer --check_plt --plt priv/plts/project.plt; then
              echo "Cached PLT is incompatible/old; deleting and rebuilding..."
              rm -f priv/plts/project.plt
            fi
          fi

          mix dialyzer --plt

      - name: Dialyzer
        run: mix dialyzer


